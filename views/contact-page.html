
<h1 id ="contact-h1">
CONTACT
</h1>
<form id="contact-form" class = "contact-form" role = "form" method = "post" data-success="Message Successfully Sent!">

    <script type="text/javascript">
        grecaptcha.render('recaptcha', {

	<div class="form-group">
		<label for="name">Name</label>
		<input type = "text" name = "name" class="form-control field" id="name" placeholder="Name" required>
	</div>
	<div class="form-group">
		<label for="email">Email Address</label>
		<input type="email" name = "email" class="form-control field" id="email" placeholder="example@email.com" required>	
	</div>
		<div class="form-group">
		<label for="subject">Subject</label>
		<input type="text" name = "subject" class="form-control field" id="subject" placeholder="Subject" required>	
	</div>
	<div class="form-group">
		<label for="message">Message</label>
		<textarea class="form-control field" name = "message" rows = "8" id="message" placeholder="Message" required></textarea>
	</div>
	<!-- reCaptcha -->
  	<div id = "recaptcha"class="g-recaptcha" data-sitekey="6LdzHQ8TAAAAAHmXxdj08S4kZK-EGr9-sEvIqfsL"></div>


  	<button type="submit button" value = "Send" class="submit btn btn-default btn-lg" id = "sendBtn">SEND</Wbutton>
	<button class="btn btn-lg btn-warning" id = "sendingBtn"><span class="glyphicon glyphicon-refresh glyphicon-refresh-animate"></span> Sending...</button>
	<div class = "alert alert-success">
	   <a href = "#" class = "close" data-dismiss = "alert">
	      &times;
	   </a>
	   
	   <strong>Success!</strong> Your Email was successfully sent.
	</div>
	<div class = "alert alert-danger">
	   <a href = "#" class = "close" data-dismiss = "alert">
	      &times;
	   </a>

	</div>
