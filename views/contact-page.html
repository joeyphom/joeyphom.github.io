<h1>
CONTACT
</h1>
<form id="contact-form" class = "contact-form" method = "post" data-success="Message Successfully Sent!">
	<div class="form-group">
		<label for="name">Name</label>
		<input type = "text" class="form-control field" id="name" placeholder="Name" required>
	</div>
	<div class="form-group">
		<label for="email">Email Address</label>
		<input type="email" name = "email" class="form-control field" id="email" placeholder="example@email.com" required>	
	</div>
		<div class="form-group">
		<label for="subject">Subject</label>
		<input type="text" name = "subject" class="form-control field" id="subject" placeholder="Subject" required>	
	</div>
	<div class="form-group">
		<label for="message"></label>
		<textarea class="form-control field" name = "message" rows = "8" id="exampleInputMessage1" placeholder="Message" required></textarea>
	</div>
	<!-- reCaptcha -->
  	<div class="g-recaptcha" data-sitekey="6Lfiug4TAAAAABkRBC3a5ya2bDyImGqUOuI8wVCq"></div>
  	<button type="submit button" class="btn btn-default btn-lg">SUBMIT</button>
</form>
